# CI workflow — runs on every push and every pull request to any branch.
# Four parallel jobs cover Go services, Python lint, Python unit tests, and UI build.
# No Docker, no external services, no real API keys — pure in-memory tests only.
# Target: all jobs complete in under 5 minutes.

name: CI

# Trigger on every push and every PR regardless of target branch.
# This catches broken commits before they accumulate.
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:

  # ── Go services ───────────────────────────────────────────────────────────────
  # Runs `go vet` (static analysis) and `go test` for both Go microservices.
  # Matrix strategy runs the same steps for log-ingestion and log-consumer in
  # parallel — one GitHub Actions runner VM per service.
  go-services:
    runs-on: ubuntu-latest
    strategy:
      # fail-fast: false means a failure in one service does not cancel the other.
      # We want to see all failures in one CI run, not just the first.
      fail-fast: false
      matrix:
        service: [log-ingestion, log-consumer]

    steps:
      # Checkout the repository so the runner has the source code.
      - uses: actions/checkout@v4

      # Install Go 1.22 — pinned to match go.mod in both services.
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          # cache: true is the default — caches the Go module download cache
          # in GitHub Actions so subsequent runs do not re-download dependencies.
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      # go vet: static analysis that catches suspicious constructs the compiler allows.
      # Examples: unreachable code, misused sync primitives, printf format mismatches.
      - name: Vet
        run: cd services/${{ matrix.service }} && go vet ./...

      # go test: runs all *_test.go files. -v prints each test name.
      # -timeout 30s: kills the test binary if it runs longer than 30 seconds —
      # prevents a single blocking test from hanging the entire CI job forever.
      - name: Test
        run: cd services/${{ matrix.service }} && go test ./... -v -timeout 30s

  # ── Python lint ───────────────────────────────────────────────────────────────
  # Runs ruff (a Rust-based Python linter, 10-100x faster than pylint/flake8)
  # across all Python services. Matrix runs all services in parallel.
  # The lint job intentionally has no external service dependencies.
  python-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # All Python services including api-gateway (even without tests, we lint it).
        service:
          - security-middleware
          - anomaly-agent
          - alert-correlator
          - context-compressor
          - semantic-cache
          - model-router
          - rca-agent
          - eval-harness
          - api-gateway

    steps:
      - uses: actions/checkout@v4

      # Python 3.11 matches the pinned version in every service Dockerfile.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install ruff at a pinned version — never :latest to prevent surprise failures.
      # ruff is a standalone tool; no service requirements.txt needed for linting.
      - name: Install ruff
        run: pip install ruff==0.4.4

      # --select E,F,W: check pycodestyle errors (E), pyflakes (F — unused imports,
      # undefined names), and pycodestyle warnings (W).
      # --ignore E501: line-length is intentionally excluded — long strings are common
      # in this codebase (SQL queries, log messages) and line length is stylistic only.
      - name: Lint
        run: cd services/${{ matrix.service }} && ruff check . --select E,F,W --ignore E501

  # ── Python unit tests ─────────────────────────────────────────────────────────
  # Runs pytest for every Python service that has unit tests.
  # api-gateway is excluded — it has no test directory.
  # test_tools.py is excluded from rca-agent — it requires a real PostgreSQL instance.
  # All tests must run with mocked external dependencies only.
  python-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # include: matrix form lets each service specify which test files to run.
      # This is how we exclude test_tools.py (PostgreSQL required) from rca-agent
      # while still running test_models.py, test_agent_loop.py, test_hybrid_rag.py.
      matrix:
        include:
          - service: security-middleware
            test_path: tests/
          # anomaly-agent: test_statistical and test_semantic use fakeredis and
          # chromadb.EphemeralClient — no real services needed.
          - service: anomaly-agent
            test_path: tests/test_statistical.py tests/test_semantic.py
          - service: alert-correlator
            test_path: tests/
          - service: context-compressor
            test_path: tests/
          - service: semantic-cache
            test_path: tests/
          - service: model-router
            test_path: tests/
          # rca-agent: test_tools.py requires real PostgreSQL — excluded.
          # test_hybrid_rag.py uses chromadb.EphemeralClient + mocked OpenAI — safe.
          # test_prompt_registry.py is omitted — tests file I/O from the prompts/ dir
          # which is at repo root, not inside the service directory.
          - service: rca-agent
            test_path: tests/test_models.py tests/test_agent_loop.py tests/test_hybrid_rag.py
          - service: eval-harness
            test_path: tests/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install service dependencies from its pinned requirements.txt.
      # pytest-timeout is added here (not in requirements.txt) because it is a
      # CI-only concern — the running service never needs a test timeout plugin.
      - name: Install deps
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest-timeout==2.3.1

      # --asyncio-mode=auto: all async def test_*() functions are automatically
      # treated as asyncio tests. This handles both @pytest.mark.asyncio decorated
      # tests and module-level pytestmark = pytest.mark.asyncio. Without this flag,
      # pytest-asyncio 0.23.x defaults to "strict" mode and may silently skip
      # unmarked async tests instead of running them.
      # OPENAI_API_KEY=test-key-not-real: if any test makes a real OpenAI call
      # instead of mocking it, it will fail with an auth error — catching the
      # mistake rather than silently passing or running up a bill.
      # POSTGRES_URL points to a non-existent host — tests using real PostgreSQL
      # will fail loudly rather than hanging. Services with DB-dependent tests
      # (test_tools.py) are excluded from this matrix.
      - name: Run tests
        run: |
          cd services/${{ matrix.service }}
          python -m pytest ${{ matrix.test_path }} -v --timeout=30 --asyncio-mode=auto
        env:
          OPENAI_API_KEY: "test-key-not-real"
          POSTGRES_URL: "postgresql://test:test@localhost/test"
          KAFKA_BOOTSTRAP_SERVERS: "localhost:9092"
          REDIS_URL: "redis://localhost:6379"
          CHROMADB_URL: "http://localhost:8000"
          LOG_LEVEL: "DEBUG"
          AUTO_LEARN: "false"

  # ── UI build ──────────────────────────────────────────────────────────────────
  # Verifies the React application compiles without errors.
  # npm ci installs exact versions from package-lock.json — faster and more
  # deterministic than npm install, which may update versions within semver ranges.
  ui-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Node 18 LTS — matches the version used in the UI Dockerfile.
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          # cache: npm caches the npm module download cache between runs.
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      # npm ci reads package-lock.json exactly — reproducible, deterministic.
      # Faster than npm install in CI because it skips the dependency resolution step.
      - name: Install deps
        run: cd ui && npm ci

      # vite build compiles the React app to static assets in ui/dist/.
      # Fails if any import is unresolved or JSX has syntax errors.
      - name: Build
        run: cd ui && npm run build
