server {
    listen 3001;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip for text-based assets. Reduces transfer size for JS/CSS
    # bundles by roughly 70%, which matters on first load.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/xml image/svg+xml;
    gzip_min_length 1024;

    # Proxy all /api requests to the gateway container.
    # In production the browser talks to nginx on :3001; nginx forwards to
    # the gateway on the internal Docker network. This mirrors what Vite's
    # proxy does in development, keeping the frontend code unchanged between
    # environments.
    location /api/ {
        proxy_pass http://api-gateway:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # SPA fallback: every path that does not match a real file is served
    # index.html so React Router can handle client-side navigation.
    # Without this, refreshing /investigations/123 returns nginx 404 because
    # that path does not exist on disk.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
